# tmux configuration
# Theme: Dracula (Official Plugin)

# =============================================================================
# 基本設定
# =============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0

# プレフィックスキー（Ctrl+a）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ペイン分割（直感的なキーバインド）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ペイン移動（Vim スタイル）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ghq + fzf: Bash のプロンプトだけで未送信の入力を破棄して picker を開く。
bind g if-shell -F '#{==:#{pane_current_command},bash}' 'send-keys C-u gcd Enter'

# ペインリサイズ
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# コピーモード（Vim スタイル）
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# 設定リロード
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# =============================================================================
# TPM (Tmux Plugin Manager)
# =============================================================================
# TPM インストール: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# プラグインインストール: prefix + I

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# =============================================================================
# Dracula Theme (Official)
# https://draculatheme.com/tmux
# =============================================================================
set -g @plugin 'dracula/tmux'

# Dracula 設定
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session
set -g @dracula-left-icon-padding 1

# 表示するプラグイン（右側）
set -g @dracula-plugins "git time"

# Git 設定
set -g @dracula-git-show-current-symbol ✓
set -g @dracula-git-show-diff-symbol !
set -g @dracula-git-no-repo-message ""

# 時刻設定
set -g @dracula-time-format "%H:%M"
set -g @dracula-day-month false
set -g @dracula-show-timezone false

# カラー設定
set -g @dracula-show-flags true
set -g @dracula-border-contrast true

# =============================================================================
# TPM 初期化（設定ファイルの最後に配置）
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'
